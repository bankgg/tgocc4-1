<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OCC4.1 Aircraft System Calendar</title>
    <meta name="description" content="Subscribe to the OCC4.1 Aircraft System training schedule in your calendar app.">
    <link rel="canonical" href="https://bankgg.github.io/tgocc4-1/calendar-ac-system.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="OCC4.1 Training Calendar">
    <meta property="og:url" content="https://bankgg.github.io/tgocc4-1/calendar-ac-system.html">
    <meta property="og:title" content="OCC4.1 Aircraft System Calendar">
    <meta property="og:description" content="Tap to subscribe to the OCC4.1 Aircraft System training schedule in Apple Calendar, Google Calendar, or another calendar app.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="OCC4.1 Aircraft System Calendar">
    <meta name="twitter:description" content="Tap to subscribe to the OCC4.1 Aircraft System training schedule in your calendar app.">
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7fb;
        color: #18202f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      button {
        width: 100%;
        min-height: 56px;
        border: 0;
        border-radius: 8px;
        background: #184f9c;
        color: #ffffff;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(24, 79, 156, 0.22);
      }

      button:active {
        transform: translateY(1px);
      }

      button:focus-visible {
        outline: 3px solid #f2c94c;
        outline-offset: 3px;
      }

      p {
        margin: 14px 0 0;
        color: #566174;
        font-size: 14px;
        line-height: 1.45;
      }

      .manual {
        display: none;
        margin-top: 18px;
      }

      .manual.is-visible {
        display: block;
      }

      code {
        display: block;
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        background: #ffffff;
        color: #263449;
        font-family: Consolas, Monaco, monospace;
        font-size: 12px;
        line-height: 1.4;
        overflow-wrap: anywhere;
        box-shadow: inset 0 0 0 1px #d9e0ec;
      }
    </style>
  </head>
  <body>
    <main>
      <button type="button" id="add-calendar">Add to Calendar</button>
      <p>Add the OCC4.1 Aircraft System training schedule to your calendar app.</p>
      <p class="manual" id="manual-help">
        If Android does not open Google Calendar, copy this calendar URL and add it from Google Calendar on a computer.
        <code id="calendar-url">webcal://bankgg.github.io/tgocc4-1/calendar-ac-system.ics</code>
      </p>
    </main>

    <script>
      const icsUrl = "https://bankgg.github.io/tgocc4-1/calendar-ac-system.ics";
      const webcalUrl = "webcal://bankgg.github.io/tgocc4-1/calendar-ac-system.ics";
      const googleCalendarUrl =
        "https://calendar.google.com/calendar/u/0/r/settings/addbyurl?cid=" + encodeURIComponent(webcalUrl);
      const chromeGoogleCalendarUrl =
        "intent://calendar.google.com/calendar/u/0/r/settings/addbyurl?cid=" +
        encodeURIComponent(webcalUrl) +
        "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
        encodeURIComponent(googleCalendarUrl) +
        ";end";

      const isAndroid = /Android/i.test(navigator.userAgent);
      const manualHelp = document.getElementById("manual-help");

      if (isAndroid) {
        manualHelp.classList.add("is-visible");
      }

      document.getElementById("add-calendar").addEventListener("click", () => {
        if (isAndroid) {
          navigator.clipboard?.writeText(webcalUrl).catch(() => {});
          window.location.href = chromeGoogleCalendarUrl;

          window.setTimeout(() => {
            if (!document.hidden) {
              window.location.href = googleCalendarUrl;
            }
          }, 900);
          return;
        }

        window.location.href = webcalUrl;

        window.setTimeout(() => {
          if (!document.hidden) {
            window.location.href = icsUrl;
          }
        }, 1200);
      });
    </script>
  </body>
</html>
