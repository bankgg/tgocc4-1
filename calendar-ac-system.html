<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OCC4.1 Aircraft System Calendar</title>
    <meta name="description" content="Subscribe to the OCC4.1 Aircraft System training schedule in your calendar app.">
    <link rel="canonical" href="https://bankgg.github.io/tgocc4-1/calendar-ac-system.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="OCC4.1 Training Calendar">
    <meta property="og:url" content="https://bankgg.github.io/tgocc4-1/calendar-ac-system.html">
    <meta property="og:title" content="OCC4.1 Aircraft System Calendar">
    <meta property="og:description" content="Tap to subscribe to the OCC4.1 Aircraft System training schedule in Apple Calendar, Google Calendar, or another calendar app.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="OCC4.1 Aircraft System Calendar">
    <meta name="twitter:description" content="Tap to subscribe to the OCC4.1 Aircraft System training schedule in your calendar app.">
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7fb;
        color: #18202f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      button {
        width: 100%;
        min-height: 56px;
        border: 0;
        border-radius: 8px;
        background: #184f9c;
        color: #ffffff;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(24, 79, 156, 0.22);
      }

      button:active {
        transform: translateY(1px);
      }

      button:focus-visible {
        outline: 3px solid #f2c94c;
        outline-offset: 3px;
      }

      p {
        margin: 14px 0 0;
        color: #566174;
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <button type="button" id="calendar-action">Subscribe in Calendar</button>
      <p id="context-text">Add the OCC4.1 Aircraft System training schedule to your calendar app.</p>
    </main>

    <script>
      const googleCalendarCid =
        "OTU0MWM0NTQwM2VlYjg1OTQ0NmU3NzI4ZjI0YzA2ZjExNmMxMTZjNDc0ZjBkYTE5YzY3MzU5OTRmNTA0ZTdkMkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t";
      const icsUrl =
        "https://calendar.google.com/calendar/ical/9541c45403eeb859446e7728f24c06f116c116c474f0da19c6735994f504e7d2%40group.calendar.google.com/public/basic.ics";
      const webcalUrl =
        "webcal://calendar.google.com/calendar/ical/9541c45403eeb859446e7728f24c06f116c116c474f0da19c6735994f504e7d2%40group.calendar.google.com/public/basic.ics";
      const googleCalendarUrl = "https://calendar.google.com/calendar/u/0/r?cid=" + googleCalendarCid;
      const googleCalendarIntentUrl =
        "intent://calendar.google.com/calendar/u/0/r?cid=" +
        googleCalendarCid +
        "#Intent;scheme=https;package=com.google.android.calendar;S.browser_fallback_url=" +
        encodeURIComponent(googleCalendarUrl) +
        ";end";
      const pageUrl = "https://bankgg.github.io/tgocc4-1/calendar-ac-system.html";
      const externalBrowserUrl =
        "intent://bankgg.github.io/tgocc4-1/calendar-ac-system.html" +
        "#Intent;scheme=https;action=android.intent.action.VIEW;" +
        "category=android.intent.category.BROWSABLE;S.browser_fallback_url=" +
        encodeURIComponent(pageUrl) +
        ";end";
      const isAndroid = /Android/i.test(navigator.userAgent);
      const isLine = /Line\//i.test(navigator.userAgent);
      const calendarAction = document.getElementById("calendar-action");
      const contextText = document.getElementById("context-text");

      if (isAndroid && isLine) {
        calendarAction.textContent = "Open in Browser";
        contextText.textContent =
          "LINE's browser cannot add this calendar directly on Android. Open it in your browser first, then subscribe there.";
      }

      calendarAction.addEventListener("click", () => {
        if (isAndroid && isLine) {
          window.location.href = externalBrowserUrl;
          return;
        }

        if (isAndroid) {
          window.location.href = googleCalendarIntentUrl;
          return;
        }

        window.location.href = webcalUrl;

        window.setTimeout(() => {
          if (!document.hidden) {
            window.location.href = icsUrl;
          }
        }, 1200);
      });
    </script>
  </body>
</html>
