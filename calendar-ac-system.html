<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OCC4.1 Aircraft System Calendar</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7fb;
        color: #18202f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      button {
        width: 100%;
        min-height: 56px;
        border: 0;
        border-radius: 8px;
        background: #184f9c;
        color: #ffffff;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0;
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(24, 79, 156, 0.22);
      }

      button:active {
        transform: translateY(1px);
      }

      button:focus-visible {
        outline: 3px solid #f2c94c;
        outline-offset: 3px;
      }

      p {
        margin: 14px 0 0;
        color: #566174;
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <button type="button" id="add-calendar">Add to Calendar</button>
      <p>Add the OCC4.1 Aircraft System training schedule to your calendar app.</p>
    </main>

    <script>
      const httpsUrl = "https://bankgg.github.io/tgocc4-1/calendar-ac-system.ics";
      const webcalUrl = "webcal://bankgg.github.io/tgocc4-1/calendar-ac-system.ics";

      document.getElementById("add-calendar").addEventListener("click", () => {
        window.location.href = webcalUrl;

        window.setTimeout(() => {
          if (!document.hidden) {
            window.location.href = httpsUrl;
          }
        }, 1200);
      });
    </script>
  </body>
</html>
